<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Convites — Grupo Soul</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C9A84C; --gold-light: #E8C97A; --dark: #0D0D0D; --dark-2: #161616; --cream: #F5F0E8; --green: #2E7D52; }
        body { font-family: 'Lato', sans-serif; background: var(--dark); color: var(--cream); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 16px; }
        .card { background: var(--dark-2); border: 1px solid rgba(201,168,76,0.3); padding: 40px; border-radius: 8px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { font-family: 'Cinzel', serif; font-size: 1.4rem; margin-bottom: 20px; color: var(--gold-light); }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(201,168,76,0.2); border-radius: 4px; color: #fff; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 4px; cursor: pointer; font-family: 'Cinzel', serif; font-weight: 700; transition: 0.3s; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-green { background: var(--green); color: #fff; }
        #feedback { margin-top: 15px; font-size: 0.85rem; padding: 10px; border-radius: 4px; display: none; }
        .error { background: rgba(255,0,0,0.1); color: #ff8a8a; border: 1px solid rgba(255,0,0,0.2); }
        .info { background: rgba(201,168,76,0.1); color: var(--gold-light); }
        .hidden { display: none !important; }
        .loader { border: 2px solid rgba(255,255,255,0.2); border-top: 2px solid #fff; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h1>Sistema de Convites</h1>
    <p id="step-label" style="font-size: 0.75rem; color: var(--gold); margin-bottom: 20px; text-transform: uppercase;">Acesso Restrito</p>

    <div id="view-auth">
        <input type="email" id="email-auth" placeholder="Seu e-mail autorizado">
        <button class="btn btn-gold" onclick="processAuth()">Verificar Acesso</button>
    </div>

    <div id="view-form" class="hidden">
        <input type="text" id="g-name" placeholder="Nome do Convidado">
        <input type="email" id="g-email" placeholder="E-mail do Convidado">
        <input type="tel" id="g-phone" placeholder="WhatsApp (00) 00000-0000">
        <button class="btn btn-green" onclick="processSubmit()">Cadastrar Convidado</button>
    </div>

    <div id="view-success" class="hidden">
        <h2 style="color:var(--green)">✓ Sucesso!</h2>
        <p>Acesso registado com sucesso.</p>
        <button class="btn btn-gold" onclick="location.reload()">Novo Cadastro</button>
    </div>

    <div id="feedback"></div>
</div>

<script>
const CFG = {
    sid: '1jsBoGErysr_p8dr0SCJykbeklapjsYHNelDASOF9LDc',
    gid: '2079499885', // <-- VERIFIQUE SE O GID DA ABA "REPORT" É MESMO 0 NO LINK DO GOOGLE
    proxy: 'https://api.allorigins.win/get?url=',
    ac: {
        url: 'https://gruposoul.api-us1.com',
        key: '90d74a42f0495ead928e7a047e53a10e536e85c9ebc8e46be54dab8d5f1508c149eb23e3'
    }
};

function notify(msg, isErr) {
    const f = document.getElementById('feedback');
    f.innerHTML = msg; f.className = isErr ? 'error' : 'info'; f.style.display = 'block';
}

async function processAuth() {
    const emailInput = document.getElementById('email-auth').value.trim().toLowerCase();
    const btn = document.querySelector('#view-auth button');
    if(!emailInput.includes('@')) return notify('E-mail inválido.', true);

    btn.disabled = true; btn.innerHTML = '<span class="loader"></span> Validando...';

    try {
        // Cache buster: adiciona a hora atual para evitar ler dados velhos do cache
        const t = new Date().getTime();
        const sheetUrl = `https://docs.google.com/spreadsheets/d/${CFG.sid}/export?format=csv&gid=${CFG.gid}&t=${t}`;
        const res = await fetch(CFG.proxy + encodeURIComponent(sheetUrl));
        const json = await res.json();
        const csv = json.contents;

        if(!csv || csv.includes('<!DOCTYPE html>')) {
            throw new Error("A folha de cálculo está bloqueada ou o GID está errado.");
        }

        const rows = csv.split(/\r?\n/).filter(line => line.trim() !== "").map(line => {
            const sep = line.includes(';') ? ';' : ',';
            return line.split(sep).map(c => c.replace(/"/g, '').trim());
        });

        // Procura em todas as linhas o e-mail na Coluna C (índice 2)
        const authorized = rows.map(r => r[2] ? r[2].toLowerCase() : "").filter(e => e !== "");

        if(authorized.includes(emailInput)) {
            document.getElementById('view-auth').classList.add('hidden');
            document.getElementById('view-form').classList.remove('hidden');
            document.getElementById('step-label').innerText = "Dados do Convidado";
            document.getElementById('feedback').style.display = 'none';
        } else {
            notify('E-mail não autorizado na Coluna C da aba Report.', true);
            btn.disabled = false; btn.innerHTML = 'Verificar Acesso';
        }
    } catch(e) {
        notify('Erro: ' + e.message, true);
        btn.disabled = false; btn.innerHTML = 'Verificar Acesso';
    }
}

async function processSubmit() {
    const name = document.getElementById('g-name').value;
    const email = document.getElementById('g-email').value;
    const phone = document.getElementById('g-phone').value;
    const btn = document.querySelector('#view-form button');

    if(!name || !email || !phone) return notify('Preencha todos os campos.', true);
    btn.disabled = true; btn.innerHTML = '<span class="loader"></span> Enviando...';

    try {
        const acUrl = CFG.proxy + encodeURIComponent(`${CFG.ac.url}/api/3/contacts`);
        await fetch(acUrl, {
            method: 'POST',
            headers: { 'Api-Token': CFG.ac.key, 'Content-Type': 'application/json' },
            body: JSON.stringify({ contact: { email, firstName: name, phone } })
        });
        document.getElementById('view-form').classList.add('hidden');
        document.getElementById('view-success').classList.remove('hidden');
        document.getElementById('feedback').style.display = 'none';
    } catch(e) {
        notify('Erro ao enviar para o ActiveCampaign.', true);
        btn.disabled = false; btn.innerHTML = 'Cadastrar Convidado';
    }
}
</script>
</body>
</html>
