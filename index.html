<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Convites — Grupo Soul</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

    <script>
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
    n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,
    document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '8118960231508203');
    </script>

    <style>
        :root {
            --gold: #C9A84C; --gold-light: #E8C97A; --gold-dark: #9A7A32;
            --dark: #0D0D0D; --dark-2: #161616; --dark-3: #1E1E1E;
            --cream: #F5F0E8; --cream-dim: #C8C0B0; --green: #2E7D52;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Lato', sans-serif; background: var(--dark); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 24px 16px; position: relative; overflow-x: hidden;
        }

        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        body::after {
            content: ''; position: fixed; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
        }

        .card {
            background: linear-gradient(160deg, var(--dark-2) 0%, var(--dark-3) 100%);
            border: 1px solid rgba(201,168,76,0.25); border-radius: 4px; padding: 48px 40px;
            width: 100%; max-width: 440px; box-shadow: 0 32px 64px rgba(0,0,0,0.6); position: relative;
        }

        .header { text-align: center; margin-bottom: 36px; }

        .emblem {
            width: 72px; height: 72px; border-radius: 50%;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
            display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
            box-shadow: 0 4px 20px rgba(201,168,76,0.35); color: var(--dark);
        }

        h1 { font-family: 'Cinzel', serif; font-size: 1.5rem; font-weight: 700; color: var(--cream); letter-spacing: 0.04em; }
        .subtitle { font-size: 0.78rem; color: var(--gold); text-transform: uppercase; margin-top: 8px; letter-spacing: 0.08em; }

        .field-group { margin-bottom: 14px; }
        label { display: block; font-size: 0.72rem; font-weight: 700; color: var(--gold); margin-bottom: 6px; text-transform: uppercase; }

        input {
            width: 100%; padding: 13px 16px; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(201,168,76,0.2); border-radius: 3px; color: var(--cream);
            outline: none; transition: 0.25s; font-family: 'Lato', sans-serif;
        }
        input:focus { border-color: var(--gold); background: rgba(255,255,255,0.06); }

        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 3px; cursor: pointer;
            font-family: 'Cinzel', serif; font-size: 0.85rem; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; margin-top: 20px;
        }
        .btn-gold { background: var(--gold); color: var(--dark); }
        .btn-green { background: var(--green); color: #fff; }

        #feedback { margin-top: 16px; padding: 11px 14px; border-radius: 3px; font-size: 0.82rem; display: none; text-align: center; }
        .error { background: rgba(176,58,46,0.15); color: #E8A09A; border: 1px solid rgba(176,58,46,0.4); }
        .success-msg { background: rgba(46,125,82,0.1); color: #82E0AA; border: 1px solid rgba(46,125,82,0.3); }

        .loader { border: 2px solid rgba(255,255,255,0.2); border-top: 2px solid #fff; border-radius: 50%; width: 16px; height: 16px; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none !important; }
        .footer { text-align: center; margin-top: 24px; font-size: 0.68rem; color: rgba(200,192,176,0.3); text-transform: uppercase; }
    </style>
</head>
<body>

<div id="app">
    <div class="card">
        <div class="header">
            <div class="emblem">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
            </div>
            <h1>Sistema de Convites</h1>
            <p class="subtitle" id="step-desc">Acesso Restrito</p>
        </div>

        <div id="auth-section">
            <div class="field-group">
                <label>Seu E-mail Institucional</label>
                <input type="email" id="auth-email" placeholder="nome@gruposoul.com">
            </div>
            <button class="btn btn-gold" onclick="verifyAccess()" id="btn-verify">Verificar Acesso</button>
        </div>

        <div id="form-section" class="hidden">
            <div style="text-align:center; font-size:0.75rem; color:var(--gold); margin-bottom:15px; font-weight:700;">Limite: 2 convites por aluno</div>
            <div class="field-group"><label>Nome do Convidado</label><input type="text" id="guest-name"></div>
            <div class="field-group"><label>E-mail do Convidado</label><input type="email" id="guest-email"></div>
            <div class="field-group"><label>WhatsApp</label><input type="tel" id="guest-phone" placeholder="11999999999"></div>
            <button class="btn btn-green" onclick="submitGuest()" id="btn-submit">Cadastrar Convidado</button>
        </div>

        <div id="success-section" class="hidden" style="text-align:center;">
            <div style="background:var(--green); width:64px; height:64px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px;"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg></div>
            <h2 style="font-family:'Cinzel'; color:var(--gold);">Sucesso!</h2>
            <p style="font-size:0.85rem; margin-top:10px;">Convidado registrado com a tag <b>db-convidado-tocha</b>.</p>
            <button class="btn btn-gold" onclick="location.reload()">Novo Cadastro</button>
        </div>

        <div id="feedback"></div>
    </div>
    <p class="footer">© 2026 Grupo Soul</p>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxw-KIA02UqaGhHZ2pFl6Km71_RWiXwXiRqRJaUNaFdUSftIsl3sFNG7OLGCLBSZeGi/exec';
const MAX_INVITES = 2;
let currentUser = "";

function notify(msg, type) {
    const f = document.getElementById('feedback');
    f.innerHTML = msg;
    f.className = type === 'error' ? 'error' : 'success-msg';
    f.style.display = 'block';
}

function getUsageKey(email) { return `usage_${email.replace(/[^a-z0-9]/g, '_')}`; }

async function verifyAccess() {
    const email = document.getElementById('auth-email').value.trim().toLowerCase();
    const btn = document.getElementById('btn-verify');
    if(!email || !email.includes('@')) return notify('Insira um e-mail válido.', 'error');

    btn.disabled = true; btn.innerHTML = '<div class="loader"></div>';

    try {
        const res = await fetch(`${SCRIPT_URL}?action=verify&email=${encodeURIComponent(email)}`);
        const data = await res.json();

        if(data.authorized) {
            const used = parseInt(localStorage.getItem(getUsageKey(email)) || '0');
            if(used >= MAX_INVITES) {
                notify(`Você já utilizou seu limite de ${MAX_INVITES} convites.`, 'error');
                btn.disabled = false; btn.innerText = 'Verificar Acesso';
            } else {
                currentUser = email;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('form-section').classList.remove('hidden');
                document.getElementById('feedback').style.display = 'none';
                document.getElementById('step-desc').innerText = 'Dados do Convidado';
            }
        } else {
            notify('E-mail não autorizado na Coluna C (Report).', 'error');
            btn.disabled = false; btn.innerText = 'Verificar Acesso';
        }
    } catch(e) {
        notify('Erro de conexão. Verifique se o Script foi publicado corretamente.', 'error');
        btn.disabled = false; btn.innerText = 'Verificar Acesso';
    }
}

async function submitGuest() {
    const name = document.getElementById('guest-name').value.trim();
    const email = document.getElementById('guest-email').value.trim();
    const phone = document.getElementById('guest-phone').value.trim();
    const btn = document.getElementById('btn-submit');

    if(!name || !email || !phone) return notify('Preencha todos os campos.', 'error');

    btn.disabled = true; btn.innerHTML = '<div class="loader"></div>';

    try {
        const url = `${SCRIPT_URL}?action=register&email=${encodeURIComponent(email)}&name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}`;
        const res = await fetch(url);
        const data = await res.json();

        if(data.success) {
            // Incrementar uso localmente
            const key = getUsageKey(currentUser);
            const currentUsed = parseInt(localStorage.getItem(key) || '0');
            localStorage.setItem(key, currentUsed + 1);

            if(typeof fbq === 'function') fbq('trackCustom', 'convidado-tocha');

            document.getElementById('form-section').classList.add('hidden');
            document.getElementById('success-section').classList.remove('hidden');
            document.getElementById('step-desc').innerText = 'Finalizado';
            document.getElementById('feedback').style.display = 'none';
        } else {
            throw new Error(data.error);
        }
    } catch(e) {
        notify('Falha no ActiveCampaign: ' + e.message, 'error');
        btn.disabled = false; btn.innerText = 'Cadastrar Convidado';
    }
}
</script>
</body>
</html>
