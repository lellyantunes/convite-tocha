<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Convites — Grupo Soul</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C9A84C; --gold-light: #E8C97A; --dark: #0D0D0D; --dark-2: #161616; --cream: #F5F0E8; --green: #2E7D52; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Lato', sans-serif; background: var(--dark); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; color: var(--cream); }
        .card { background: linear-gradient(160deg, var(--dark-2) 0%, #1a1a1a 100%); border: 1px solid rgba(201,168,76,0.3); border-radius: 8px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; }
        .header { text-align: center; margin-bottom: 30px; }
        .emblem { width: 60px; height: 60px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; color: var(--dark); }
        h1 { font-family: 'Cinzel', serif; font-size: 1.4rem; letter-spacing: 2px; margin-bottom: 5px; }
        .subtitle { font-size: 0.75rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; font-weight: 700; }
        input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(201,168,76,0.2); border-radius: 4px; color: #fff; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 4px; font-family: 'Cinzel', serif; font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-gold { background: var(--gold); color: var(--dark); }
        .btn-green { background: var(--green); color: #fff; }
        .counter { background: rgba(201,168,76,0.1); border: 1px solid var(--gold); color: var(--gold-light); padding: 8px; border-radius: 4px; font-size: 0.75rem; text-align: center; margin-bottom: 20px; font-weight: 700; }
        #feedback { margin-top: 15px; font-size: 0.8rem; padding: 10px; border-radius: 4px; display: none; text-align: center; }
        .error { background: rgba(255,0,0,0.1); color: #ff6b6b; border: 1px solid #ff6b6b; }
        .hidden { display: none; }
        .loader { border: 2px solid rgba(255,255,255,0.2); border-top: 2px solid var(--gold); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="emblem">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
        </div>
        <h1>Sistema de Convites</h1>
        <p class="subtitle" id="step-name">Acesso Aluno</p>
    </div>

    <div id="auth-section">
        <div class="field">
            <label>Seu E-mail de Aluno</label>
            <input type="email" id="user-email" placeholder="email@exemplo.com">
        </div>
        <button class="btn btn-gold" onclick="verify()" id="btn-verify">Validar Acesso</button>
    </div>

    <div id="form-section" class="hidden">
        <div class="counter" id="invite-msg">Verificando convites...</div>
        <div class="field"><label>Nome do Convidado</label><input type="text" id="g-name"></div>
        <div class="field"><label>E-mail do Convidado</label><input type="email" id="g-email"></div>
        <div class="field"><label>WhatsApp</label><input type="tel" id="g-phone" placeholder="11999999999"></div>
        <button class="btn btn-green" onclick="register()" id="btn-reg">Enviar Convite</button>
    </div>

    <div id="success-section" class="hidden" style="text-align:center;">
        <h2 style="color:var(--gold); font-family:Cinzel; margin-bottom:10px;">Sucesso!</h2>
        <p style="font-size:0.9rem; margin-bottom:20px;">O cadastro foi enviado ao ActiveCampaign.</p>
        <button class="btn btn-gold" onclick="location.reload()">Novo Cadastro</button>
    </div>

    <div id="feedback"></div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyissPb7bC8Z62t9MhecxdyUOrkoL390q2eTyEAT-RsEdRQ1ziDdKf8soTcBxCmnPik/exec';
let currentUser = "";

function showMsg(m, type) {
    const f = document.getElementById('feedback');
    f.innerHTML = m; f.className = type === 'error' ? 'error' : '';
    f.style.display = 'block';
}

async function verify() {
    const email = document.getElementById('user-email').value.trim().toLowerCase();
    const btn = document.getElementById('btn-verify');
    if(!email) return showMsg("Insira seu e-mail.", "error");

    btn.disabled = true; btn.innerHTML = '<div class="loader"></div>';

    try {
        const res = await fetch(`${SCRIPT_URL}?action=verify&userEmail=${encodeURIComponent(email)}`);
        const data = await res.json();

        if(data.authorized) {
            if(data.remaining <= 0) {
                showMsg("Você já usou seus 2 convites.", "error");
                btn.disabled = false; btn.innerText = "Validar Acesso";
            } else {
                currentUser = email;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('form-section').classList.remove('hidden');
                document.getElementById('invite-msg').innerText = `Você possui ${data.remaining} convite(s) restante(s)`;
                document.getElementById('step-name').innerText = "Dados do Convidado";
                document.getElementById('feedback').style.display = 'none';
            }
        } else {
            showMsg("E-mail não autorizado.", "error");
            btn.disabled = false; btn.innerText = "Validar Acesso";
        }
    } catch(e) {
        showMsg("Erro de conexão.", "error");
        btn.disabled = false; btn.innerText = "Validar Acesso";
    }
}

async function register() {
    const name = document.getElementById('g-name').value.trim();
    const email = document.getElementById('g-email').value.trim();
    const phone = document.getElementById('g-phone').value.trim();
    const btn = document.getElementById('btn-reg');

    if(!name || !email || !phone) return showMsg("Preencha tudo.", "error");

    btn.disabled = true; btn.innerHTML = '<div class="loader"></div>';

    try {
        const url = `${SCRIPT_URL}?action=register&userEmail=${encodeURIComponent(currentUser)}&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&phone=${encodeURIComponent(phone)}`;
        const res = await fetch(url);
        const data = await res.json();

        if(data.success) {
            document.getElementById('form-section').classList.add('hidden');
            document.getElementById('success-section').classList.remove('hidden');
            document.getElementById('step-name').innerText = "Finalizado";
        } else {
            showMsg("Erro no ActiveCampaign: " + data.error, "error");
            btn.disabled = false; btn.innerText = "Enviar Convite";
        }
    } catch(e) {
        showMsg("Erro ao processar.", "error");
        btn.disabled = false; btn.innerText = "Enviar Convite";
    }
}
</script>
</body>
</html>
