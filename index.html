<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Convidados - Grupo Soul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #3b82f6;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-md">
        <!-- Card Principal -->
        <div class="glass p-8 rounded-3xl shadow-2xl transition-all duration-500 transform">
            
            <!-- Logo / Header -->
            <div id="header-container" class="text-center mb-8">
                <div id="header-icon" class="bg-blue-600 w-16 h-16 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg transition-colors duration-500">
                    <svg id="svg-icon" xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                    </svg>
                </div>
                <h1 id="main-title" class="text-2xl font-bold text-gray-800">Sistema de Convites</h1>
                <p class="text-gray-500 text-sm mt-2" id="step-description">Acesso restrito: limite de 2 convites por aluno</p>
            </div>

            <!-- Etapa 1: Verificação de E-mail -->
            <div id="auth-section" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Seu E-mail Institucional</label>
                    <input type="email" id="auth-email" placeholder="nome@exemplo.com" 
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                </div>
                <button id="btn-verify" onclick="verifyAccess()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl shadow-md transition transform active:scale-95">
                    Verificar Acesso
                </button>
            </div>

            <!-- Etapa 2: Formulário de Convidado -->
            <div id="form-section" class="hidden space-y-4">
                <div class="mb-2 text-xs font-semibold text-blue-600 bg-blue-50 p-2 rounded-lg text-center" id="invite-counter">
                    Convites restantes: carregando...
                </div>
                <div class="space-y-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nome do Convidado</label>
                        <input type="text" id="guest-name" placeholder="Nome Completo" 
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">E-mail do Convidado</label>
                        <input type="email" id="guest-email" placeholder="email@convidado.com" 
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Telefone (WhatsApp)</label>
                        <input type="tel" id="guest-phone" placeholder="(00) 00000-0000" 
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                    </div>
                </div>
                <button onclick="submitToActiveCampaign()" id="btn-submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl shadow-md transition transform active:scale-95 flex items-center justify-center">
                    <span>Cadastrar Convidado</span>
                </button>
            </div>

            <!-- Etapa 3: Tela de Sucesso -->
            <div id="success-section" class="hidden text-center space-y-6 py-4 animate-in fade-in zoom-in duration-500">
                <div class="space-y-2">
                    <h2 class="text-xl font-bold text-gray-800">Parabéns!</h2>
                    <p class="text-gray-600">
                        Seu convidado foi cadastrado com sucesso. <br>
                        Ele receberá as informações de acesso por e-mail.
                    </p>
                </div>
                <button onclick="resetToInviteForm()" class="text-blue-600 hover:text-blue-800 font-medium text-sm flex items-center justify-center mx-auto transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    Cadastrar outro convidado
                </button>
            </div>

            <!-- Mensagens de Feedback -->
            <div id="feedback" class="mt-4 p-3 rounded-xl text-sm hidden"></div>
        </div>

        <!-- Rodapé -->
        <p class="text-center text-gray-400 text-xs mt-6">© 2024 Grupo Soul - Todos os direitos reservados</p>
    </div>

        const PROXY_BASE = 'https://corsproxy.io/?';
        const AC_CONFIG = {
            url: 'https://gruposoul.api-us1.com',
            token: '90d74a42f0495ead928e7a047e53a10e536e85c9ebc8e46be54dab8d5f1508c149eb23e3',

        };

        const INVITE_LIMIT = 2;
        let currentUserEmail = '';

        // ELEMENTOS UI
        window.verifyAccess = verifyAccess;
        window.submitToActiveCampaign = submitToActiveCampaign;
        window.resetToInviteForm = resetToInviteForm;

        const authSection = document.getElementById('auth-section');
        const formSection = document.getElementById('form-section');
        const successSection = document.getElementById('success-section');
        const feedback = document.getElementById('feedback');
        const stepDesc = document.getElementById('step-description');
        const headerIcon = document.getElementById('header-icon');
        const svgIcon = document.getElementById('svg-icon');
        const inviteCounterDisplay = document.getElementById('invite-counter');

        async function init() {
            try {
                await signInAnonymously(auth);
            } catch (err) {
                console.error("Erro auth:", err);
            }
        }
        init();

        // 1. VERIFICAR ACESSO E LIMITE
        async function verifyAccess() {
            const emailInput = document.getElementById('auth-email').value.trim().toLowerCase();
            const btn = document.getElementById('btn-verify');

            if (!AUTHORIZED_EMAILS.has(emailInput)) {
                showFeedback('E-mail não autorizado na planilha de alunos ativos.', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<div class="loader mx-auto"></div>`;

            try {
                currentUserEmail = emailInput;
                const invitesCount = await getInviteCount(emailInput);

                if (invitesCount >= INVITE_LIMIT) {
                    showFeedback(`Limite atingido! Você já utilizou seus ${INVITE_LIMIT} convites permitidos.`, 'error');
                    btn.disabled = false;
                    btn.innerText = 'Verificar Acesso';
                } else {
                    showFeedback('Acesso autorizado!', 'success');
                    updateCounterDisplay(invitesCount);
                    setTimeout(() => {
                        authSection.classList.add('hidden');
                        formSection.classList.remove('hidden');
                        feedback.classList.add('hidden');
                        stepDesc.innerText = 'Preencha os dados do seu convidado';
                    }, 800);
                }
            } catch (err) {
                showFeedback('Erro ao verificar limite. Tente novamente.', 'error');
                btn.disabled = false;
                btn.innerText = 'Verificar Acesso';
            }
        }

        // 2. BUSCAR CONTAGEM NO FIRESTORE
        async function getInviteCount(email) {
            // Document ID amigável para o Firestore (removendo caracteres especiais se necessário)
            const docId = btoa(email); 
            const inviteRef = doc(db, 'artifacts', appId, 'public', 'data', 'user_invites', docId);
            const docSnap = await getDoc(inviteRef);

            if (docSnap.exists()) {
                return docSnap.data().count || 0;
            } else {
                return 0;
            }
        }

        function updateCounterDisplay(count) {
            const remaining = INVITE_LIMIT - count;
            inviteCounterDisplay.innerText = `Você possui ${remaining} ${remaining === 1 ? 'convite restante' : 'convites restantes'}`;
        }

        // 3. ENVIAR PARA ACTIVE CAMPAIGN E INCREMENTAR
        async function submitToActiveCampaign() {
            const name = document.getElementById('guest-name').value.trim();
            const email = document.getElementById('guest-email').value.trim();
            const phone = document.getElementById('guest-phone').value.trim();
            const btn = document.getElementById('btn-submit');

            if (!name || !email || !phone) {
                showFeedback('Por favor, preencha todos os campos.', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<div class="loader mr-3"></div> Processando...`;

            try {
                // Verificar limite novamente antes de processar
                const currentCount = await getInviteCount(currentUserEmail);
                if (currentCount >= INVITE_LIMIT) {
                    throw new Error(`Limite de ${INVITE_LIMIT} convites já alcançado.`);
                }

                // Fluxo Active Campaign
                let contactId;
                try {
                    const res = await acFetch('/api/3/contacts', 'POST', {
                        contact: { email, firstName: name, phone }
                    });
                    contactId = res.contact.id;
                } catch (e) {
                    const search = await acFetch(`/api/3/contacts?email=${encodeURIComponent(email)}`);
                    if (search.contacts && search.contacts.length > 0) {
                        contactId = search.contacts[0].id;
                    } else {
                        throw e;
                    }
                }

                const tagsRes = await acFetch(`/api/3/tags?search=${AC_CONFIG.tagSlug}`);
                const tag = tagsRes.tags.find(t => t.tag === AC_CONFIG.tagSlug);
                if (!tag) throw new Error(`Tag "${AC_CONFIG.tagSlug}" não encontrada.`);

                await acFetch('/api/3/contactTags', 'POST', {
                    contactTag: { contact: contactId, tag: tag.id }
                });

                // Atualizar Firestore
                const docId = btoa(currentUserEmail);
                const inviteRef = doc(db, 'artifacts', appId, 'public', 'data', 'user_invites', docId);
                await setDoc(inviteRef, { 
                    email: currentUserEmail, 
                    count: increment(1),
                    last_update: new Date().toISOString()
                }, { merge: true });

                showSuccessScreen();

            } catch (error) {
                console.error('Erro:', error);
                showFeedback(`Erro: ${error.message}`, 'error');
                btn.disabled = false;
                btn.innerText = 'Cadastrar Convidado';
            }
        }

        // HELPERS
        async function acFetch(endpoint, method = 'GET', body = null) {
            const fullUrl = `${AC_CONFIG.url}${endpoint}`;
            const targetUrl = `${PROXY_BASE}${encodeURIComponent(fullUrl)}`;
            const options = {
                method: method,
                headers: { 'Api-Token': AC_CONFIG.token, 'Accept': 'application/json' }
            };
            if (body) {
                options.headers['Content-Type'] = 'application/json';
                options.body = JSON.stringify(body);
            }
            const response = await fetch(targetUrl, options);
            if (!response.ok) throw new Error(`Erro API ActiveCampaign (${response.status})`);
            return await response.json();
        }

        function showFeedback(msg, type) {
            feedback.innerText = msg;
            feedback.className = `mt-4 p-3 rounded-xl text-sm ${type === 'error' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
            feedback.classList.remove('hidden');
        }

        function showSuccessScreen() {
            formSection.classList.add('hidden');
            feedback.classList.add('hidden');
            successSection.classList.remove('hidden');
            stepDesc.innerText = 'Cadastro concluído';
            headerIcon.classList.replace('bg-blue-600', 'bg-green-500');
            svgIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />`;
        }

        async function resetToInviteForm() {
            // Recarregar contagem
            const count = await getInviteCount(currentUserEmail);
            if (count >= INVITE_LIMIT) {
                showFeedback(`Você já utilizou seus ${INVITE_LIMIT} convites.`, 'error');
                return;
            }

            document.getElementById('guest-name').value = '';
            document.getElementById('guest-email').value = '';
            document.getElementById('guest-phone').value = '';
            
            successSection.classList.add('hidden');
            formSection.classList.remove('hidden');
            updateCounterDisplay(count);
            stepDesc.innerText = 'Preencha os dados do seu convidado';
            headerIcon.classList.replace('bg-green-500', 'bg-blue-600');
            svgIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />`;
            
            const btn = document.getElementById('btn-submit');
            btn.disabled = false;
            btn.innerText = 'Cadastrar Convidado';
        }
