<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Convites — Grupo Soul</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

    <script>

    n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
    n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,
    document,'script','https://connect.facebook.net/en_US/fbevents.js');

    </script>

    <style>
        :root {
            --gold:       #C9A84C;
            --gold-light: #E8C97A;
            --gold-dark:  #9A7A32;
            --dark:       #0D0D0D;
            --dark-2:     #161616;
            --dark-3:     #1E1E1E;
            --cream:      #F5F0E8;
            --cream-dim:  #C8C0B0;
            --green:      #2E7D52;
            --green-light:#3DA06A;
            --red:        #B03A2E;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Lato', sans-serif;
            background: var(--dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        #app { width: 100%; max-width: 440px; position: relative; z-index: 1; }

        .card {
            background: linear-gradient(160deg, var(--dark-2) 0%, var(--dark-3) 100%);
            border: 1px solid rgba(201,168,76,0.25);
            border-radius: 4px;
            padding: 48px 40px 40px;
            box-shadow: 0 32px 64px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
        }

        /* Ornamentos de canto */
        .card::before, .card::after {
            content: ''; position: absolute; width: 40px; height: 40px;
            border-color: var(--gold-dark); border-style: solid; opacity: 0.4;
        }
        .card::before { top: 12px; left: 12px; border-width: 1px 0 0 1px; }
        .card::after  { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }

        .header { text-align: center; margin-bottom: 36px; }
        .emblem {
            width: 72px; height: 72px; border-radius: 50%;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; box-shadow: 0 4px 20px rgba(201,168,76,0.35);
        }
        .emblem svg { width: 32px; height: 32px; color: var(--dark); }

        h1 { font-family: 'Cinzel', serif; font-size: 1.5rem; color: var(--cream); letter-spacing: 0.04em; }
        .subtitle { font-size: 0.78rem; color: var(--cream-dim); text-transform: uppercase; margin-top: 8px; }

        .field-group { margin-bottom: 14px; }
        label { display: block; font-size: 0.72rem; font-weight: 700; color: var(--gold); margin-bottom: 6px; text-transform: uppercase; }

        input {
            width: 100%; padding: 13px 16px; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(201,168,76,0.2); border-radius: 3px; color: var(--cream);
            outline: none; transition: all 0.25s;
        }
        input:focus { border-color: var(--gold); background: rgba(255,255,255,0.06); }

        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 3px;
            font-family: 'Cinzel', serif; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 20px; transition: transform 0.15s; text-decoration: none;
        }
        .btn-gold { background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light)); color: var(--dark); }
        .btn-green { background: linear-gradient(135deg, var(--green), var(--green-light)); color: #fff; }
        .btn-whatsapp { background: linear-gradient(135deg, #128C7E, #25D366); color: #fff; font-family: 'Lato'; font-weight: 700; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Badge Contador */
        .invite-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.25);
            border-radius: 20px; padding: 5px 12px; font-size: 0.72rem; color: var(--gold-light);
            margin-bottom: 10px;
        }

        .quota-bar-wrap { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; margin-bottom: 20px; }
        .quota-bar { height: 100%; background: var(--gold); transition: width 0.6s ease; }

        #feedback { margin-top: 16px; padding: 11px; border-radius: 3px; font-size: 0.82rem; display: none; }
        #feedback.error { background: rgba(176,58,46,0.15); border: 1px solid rgba(176,58,46,0.4); color: #E8A09A; }
        #feedback.info { background: rgba(201,168,76,0.1); color: var(--gold-light); }

        .hidden { display: none !important; }
        .fade-in { animation: fade-in 0.4s ease both; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .loader { width: 18px; height: 18px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="app">
    <div class="card">
        <div class="header">
            <div class="emblem" id="emblem">
                <svg id="emblem-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
                </svg>
            </div>
            <h1 id="main-title">Sistema de Convites</h1>
            <p class="subtitle" id="step-desc">Acesso restrito • Alunos Tocha</p>
        </div>

        <div id="auth-section" class="fade-in">
            <div class="field-group">
                <label>Seu E-mail de Aluno</label>
                <input type="email" id="auth-email" placeholder="seu@email.com">
            </div>
            <button class="btn btn-gold" onclick="verifyAccess()" id="btn-verify">Verificar Acesso</button>
        </div>

        <div id="form-section" class="hidden fade-in">
            <div id="invite-status-ui"></div>
            <div class="field-group">
                <label>Nome do Convidado</label>
                <input type="text" id="guest-name" placeholder="Nome Completo">
            </div>
            <div class="field-group">
                <label>E-mail do Convidado</label>
                <input type="email" id="guest-email" placeholder="email@convidado.com">
            </div>
            <div class="field-group">
                <label>Telefone (WhatsApp)</label>
                <input type="tel" id="guest-phone" placeholder="(00) 00000-0000">
            </div>
            <button class="btn btn-green" onclick="submitGuest()" id="btn-submit">Enviar Convite</button>
        </div>

        <div id="success-section" class="hidden fade-in" style="text-align:center;">
            <div style="background: var(--green); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>
            </div>
            <h2 style="color:var(--cream); margin-bottom:10px; font-family: 'Cinzel';">Convite Enviado!</h2>
            <p style="color:var(--cream-dim); font-size:0.85rem; line-height:1.5; margin-bottom:25px;">
                O cadastro foi concluído com sucesso.<br>Peça para o convidado entrar no grupo abaixo:
            </p>
            
            <a href="https://sndflw.com/i/decifrandoossegredosdabiblia" target="_blank" class="btn btn-whatsapp">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 00-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                Entrar no Grupo WhatsApp
            </a>

            <div style="height: 1px; background: rgba(201,168,76,0.2); margin: 25px 0;"></div>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--gold); cursor:pointer; font-size:0.75rem; text-transform:uppercase; font-weight:700;">Cadastrar outro convidado</button>
        </div>

        <div id="feedback"></div>
    </div>
</div>

<script>
const CONFIG = {
    maxInvitesPerEmail: 2,
    webhookUrl: 'https://n8nwebhook.escolatocha.com.br/webhook/convite-tocha',
    // LISTA DE EMAILS (Extraídos do seu CSV)
    authorizedEmails: ["terapeutasilviamaria@hotmail.com", "patricia.depieri@gmail.com", "luizatamikos@gmail.com", "convivencia70@gmail.com", "andreadalbellozeni@hotmail.com", "mdcarmopaico@gmail.com", "doriscalixto@gmail.com", "alexandream2013@gmail.com", "claudialim1963@gmail.com", "anasacucci@gmail.com", "g.strecht@gmail.com", "marianacamera1@gmail.com", "caroljsn@gmail.com", "leoninasc@hotmail.com", "lechinilucila@gmail.com", "flaviomoreira5580@yahoo.com", "judiniz2004@gmail.com", "leandro.ribeiro3145@gmail.com", "ivoneidearantes@gmail.com", "lshisue@hotmail.com", "abezer@gmail.com", "silveiraliz@gmail.com", "castro19812015@outlook.com", "fazenda.falcao@yahoo.com.br", "mdaitai@yahoo.com.br", "vasconcelossonia304@gmail.com", "sintonia92@gmail.com", "raphaela.simon@gmail.com", "renatarodriguescgomes@gmail.com", "luizfolly@gmail.com", "angelaanarosa@hotmail.com", "andreia10coelho@gmail.com", "soniazcabral@gmail.com", "fjozias12@gmail.com", "avanimartins@gmail.com", "marrozm@yahoo.com.br"]
};

let state = { currentUserEmail: null };

function getUsedCount(email) { return parseInt(localStorage.getItem('inv_' + email) || '0', 10); }

function showFeedback(msg, type = 'info') {
    const f = document.getElementById('feedback');
    f.innerHTML = msg; f.className = type; f.style.display = 'block';
}

function verifyAccess() {
    const email = document.getElementById('auth-email').value.trim().toLowerCase();
    if (!CONFIG.authorizedEmails.includes(email)) {
        showFeedback('E-mail não autorizado para acesso aos convites.', 'error');
        return;
    }
    const used = getUsedCount(email);
    if (used >= CONFIG.maxInvitesPerEmail) {
        showFeedback('Você já utilizou o limite de 2 convites.', 'error');
        return;
    }

    state.currentUserEmail = email;
    document.getElementById('auth-section').classList.add('hidden');
    document.getElementById('form-section').classList.remove('hidden');
    renderBadge(used);
}

function renderBadge(used) {
    const remaining = CONFIG.maxInvitesPerEmail - used;
    const pct = (used / CONFIG.maxInvitesPerEmail) * 100;
    document.getElementById('invite-status-ui').innerHTML = `
        <div class="invite-badge"><span></span> ${remaining} convite(s) restante(s)</div>
        <div class="quota-bar-wrap"><div class="quota-bar" style="width:${pct}%"></div></div>
    `;
}

async function submitGuest() {
    const name = document.getElementById('guest-name').value.trim();
    const email = document.getElementById('guest-email').value.trim();
    const phone = document.getElementById('guest-phone').value.trim();
    const btn = document.getElementById('btn-submit');

    if (!name || !email || !phone) { showFeedback('Preencha todos os campos.', 'error'); return; }

    btn.disabled = true; btn.innerHTML = '<div class="loader"></div>';

    try {
        // Envio Webhook n8n
        await fetch(CONFIG.webhookUrl, {
            method: 'POST',
            mode: 'no-cors', // Para evitar bloqueios de CORS simples no navegador
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                aluno_origem: state.currentUserEmail,
                convidado_nome: name,
                convidado_email: email,
                convidado_telefone: phone
            })
        });

        // Simula delay para feedback visual
        const current = getUsedCount(state.currentUserEmail);
        localStorage.setItem('inv_' + state.currentUserEmail, (current + 1).toString());

        document.getElementById('form-section').classList.add('hidden');
        document.getElementById('success-section').classList.remove('hidden');
        document.getElementById('step-desc').innerText = 'Cadastro concluído';
        
    } catch (err) {
        showFeedback('Erro: ' + err.message, 'error');
        btn.disabled = false; btn.innerText = 'Enviar Convite';
    }
}
</script>
</body>
</html>
