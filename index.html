<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convites - Grupo Soul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .loader { border: 3px solid #f3f3f3; border-radius: 50%; border-top: 3px solid #3b82f6; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-md">
        <div class="glass p-8 rounded-3xl shadow-xl transition-all">
            
            <!-- Cabeçalho -->
            <div class="text-center mb-8">
                <div id="status-icon" class="bg-blue-600 w-16 h-16 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg transition-colors">
                    <svg id="main-svg" xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                    </svg>
                </div>
                <h1 id="title" class="text-2xl font-bold text-slate-800">Convite Soul</h1>
                <p id="subtitle" class="text-slate-500 text-sm mt-1">Valide o seu e-mail para começar</p>
            </div>

            <!-- Etapa 1: Login -->
            <div id="step-login" class="space-y-4">
                <input type="email" id="auth-email" placeholder="O seu e-mail institucional" 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition">
                <button onclick="handleLogin()" id="btn-login" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl shadow-md transition active:scale-95">
                    Entrar
                </button>
            </div>

            <!-- Etapa 2: Formulário de Convidado -->
            <div id="step-form" class="hidden space-y-4">
                <div class="bg-blue-50 p-3 rounded-xl text-center mb-2">
                    <span id="counter-text" class="text-blue-700 text-xs font-bold uppercase tracking-wider">A verificar convites...</span>
                </div>
                <div class="space-y-3">
                    <input type="text" id="guest-name" placeholder="Nome do Convidado" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition">
                    <input type="email" id="guest-email" placeholder="E-mail do Convidado" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition">
                    <input type="tel" id="guest-phone" placeholder="WhatsApp (ex: 351912345678)" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <button onclick="handleRegister()" id="btn-register" class="w-full bg-slate-800 hover:bg-black text-white font-semibold py-3 rounded-xl shadow-md transition active:scale-95">
                    Cadastrar Convidado
                </button>
            </div>

            <!-- Etapa 3: Sucesso -->
            <div id="step-success" class="hidden text-center space-y-6 py-4">
                <div class="text-slate-600 leading-relaxed">
                    Parabéns, o seu convidado foi cadastrado com sucesso. Ele receberá as informações de acesso por e-mail.
                </div>
                <button onclick="resetFlow()" class="text-blue-600 font-semibold hover:underline flex items-center justify-center w-full">
                    Cadastrar outro convidado
                </button>
            </div>

            <!-- Feedback -->
            <div id="msg" class="mt-4 p-3 rounded-xl text-sm hidden text-center"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- CONFIGURAÇÃO ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyissPb7bC8Z62t9MhecxdyUOrkoL390q2eTyEAT-RsEdRQ1ziDdKf8soTcBxCmnPik/exec"; 
        const PROXY_URL = "https://corsproxy.io/?";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'soul-invites';

        let userEmail = "";
        const INVITE_LIMIT = 2;

        const ui = {
            login: document.getElementById('step-login'),
            form: document.getElementById('step-form'),
            success: document.getElementById('step-success'),
            msg: document.getElementById('msg'),
            btnLog: document.getElementById('btn-login'),
            btnReg: document.getElementById('btn-register'),
            counter: document.getElementById('counter-text'),
            title: document.getElementById('title'),
            subtitle: document.getElementById('subtitle'),
            icon: document.getElementById('status-icon'),
            svg: document.getElementById('main-svg')
        };

        function showMsg(text, isError = false) {
            ui.msg.innerText = text;
            ui.msg.className = `mt-4 p-3 rounded-xl text-sm text-center ${isError ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600'}`;
            ui.msg.classList.remove('hidden');
        }

        async function getInviteCount(email) {
            // Document ID baseado no email (base64) para evitar caracteres inválidos
            const id = btoa(email.toLowerCase());
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'invite_counters', id);
            const snap = await getDoc(docRef);
            return snap.exists() ? snap.data().count : 0;
        }

        // --- LÓGICA DE LOGIN ---
        window.handleLogin = async () => {
            const email = document.getElementById('auth-email').value.trim().toLowerCase();
            if (!email) return showMsg("Por favor, introduza o seu e-mail.", true);

            ui.btnLog.disabled = true;
            ui.btnLog.innerHTML = `<div class="loader mx-auto"></div>`;

            try {
                // 1. Auth Firebase primeiro
                await signInAnonymously(auth);
                
                // 2. Validar na Planilha via Apps Script (usando proxy para evitar CORS)
                const target = `${SCRIPT_URL}?action=verify&email=${encodeURIComponent(email)}`;
                const response = await fetch(PROXY_URL + encodeURIComponent(target));
                const data = await response.json();

                if (!data.authorized) {
                    throw new Error("E-mail não autorizado ou não encontrado na lista.");
                }

                userEmail = email;
                
                // 3. Verificar limite de convites
                const count = await getInviteCount(email);
                if (count >= INVITE_LIMIT) {
                    throw new Error("Já atingiu o seu limite de 2 convites.");
                }

                // Transição de tela
                ui.login.classList.add('hidden');
                ui.form.classList.remove('hidden');
                ui.msg.classList.add('hidden');
                ui.subtitle.innerText = "Preencha os dados do seu convidado";
                updateCounterUI(count);

            } catch (err) {
                showMsg(err.message, true);
                ui.btnLog.disabled = false;
                ui.btnLog.innerText = "Entrar";
            }
        };

        function updateCounterUI(count) {
            const remaining = INVITE_LIMIT - count;
            ui.counter.innerText = `Tem ${remaining} ${remaining === 1 ? 'convite restante' : 'convites restantes'}`;
        }

        // --- LÓGICA DE REGISTO ---
        window.handleRegister = async () => {
            const name = document.getElementById('guest-name').value.trim();
            const email = document.getElementById('guest-email').value.trim();
            const phone = document.getElementById('guest-phone').value.trim();

            if (!name || !email || !phone) return showMsg("Preencha todos os campos.", true);

            ui.btnReg.disabled = true;
            ui.btnReg.innerHTML = `<div class="loader mx-auto"></div>`;

            try {
                // Checagem final de segurança do limite
                const currentCount = await getInviteCount(userEmail);
                if (currentCount >= INVITE_LIMIT) throw new Error("Limite de convites excedido.");

                // 1. Chamar Apps Script para registar no ActiveCampaign
                const target = `${SCRIPT_URL}?action=register&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&phone=${encodeURIComponent(phone)}`;
                const response = await fetch(PROXY_URL + encodeURIComponent(target));
                const data = await response.json();

                if (!data.success) throw new Error(data.error || "Erro ao processar o registo.");

                // 2. Incrementar contador no Firestore
                const id = btoa(userEmail);
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'invite_counters', id), {
                    count: increment(1),
                    email: userEmail,
                    last_invite_at: new Date().toISOString()
                }, { merge: true });

                showSuccessScreen();

            } catch (err) {
                showMsg(err.message, true);
                ui.btnReg.disabled = false;
                ui.btnReg.innerText = "Cadastrar Convidado";
            }
        };

        function showSuccessScreen() {
            ui.form.classList.add('hidden');
            ui.msg.classList.add('hidden');
            ui.success.classList.remove('hidden');
            ui.title.innerText = "Sucesso!";
            ui.subtitle.innerText = "Cadastro finalizado";
            ui.icon.classList.replace('bg-blue-600', 'bg-green-500');
            ui.svg.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />`;
        }

        window.resetFlow = async () => {
            const count = await getInviteCount(userEmail);
            if (count >= INVITE_LIMIT) {
                showMsg("Já utilizou todos os seus convites disponíveis.", true);
                ui.success.classList.add('hidden');
                return;
            }
            
            ui.success.classList.add('hidden');
            ui.form.classList.remove('hidden');
            ui.title.innerText = "Convite Soul";
            ui.subtitle.innerText = "Preencha os dados do seu convidado";
            ui.icon.classList.replace('bg-green-500', 'bg-blue-600');
            ui.svg.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />`;
            
            document.getElementById('guest-name').value = "";
            document.getElementById('guest-email').value = "";
            document.getElementById('guest-phone').value = "";
            ui.btnReg.disabled = false;
            ui.btnReg.innerText = "Cadastrar Convidado";
            updateCounterUI(count);
        };
    </script>
</body>
</html>
