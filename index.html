<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Convites — Escola Tocha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

    <script>
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
    n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,
    document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '8118960231508203');
    </script>

    <style>
        :root {
            --gold: #C9A84C; --gold-light: #E8C97A; --gold-dark: #9A7A32;
            --dark: #0D0D0D; --dark-2: #161616; --dark-3: #1E1E1E;
            --cream: #F5F0E8; --cream-dim: #C8C0B0;
            --green: #2E7D52; --green-light: #3DA06A;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Lato', sans-serif; background: var(--dark); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 24px 16px; position: relative; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }
        #app { width: 100%; max-width: 440px; position: relative; z-index: 1; }
        .card {
            background: linear-gradient(160deg, var(--dark-2) 0%, var(--dark-3) 100%);
            border: 1px solid rgba(201,168,76,0.25); border-radius: 4px;
            padding: 48px 40px 40px; box-shadow: 0 32px 64px rgba(0,0,0,0.6);
            position: relative; overflow: hidden;
        }
        .header { text-align: center; margin-bottom: 36px; }
        .emblem {
            width: 72px; height: 72px; border-radius: 50%;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
            display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
        }
        .emblem svg { width: 32px; height: 32px; color: var(--dark); }
        h1 { font-family: 'Cinzel', serif; font-size: 1.5rem; color: var(--cream); letter-spacing: 0.04em; }
        .subtitle { font-size: 0.78rem; color: var(--cream-dim); text-transform: uppercase; margin-top: 8px; }
        .field-group { margin-bottom: 14px; }
        label { display: block; font-size: 0.72rem; font-weight: 700; color: var(--gold); margin-bottom: 6px; text-transform: uppercase; }
        input {
            width: 100%; padding: 13px 16px; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(201,168,76,0.2); border-radius: 3px; color: var(--cream); outline: none;
        }
        input:focus { border-color: var(--gold); background: rgba(255,255,255,0.06); }
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 3px; cursor: pointer;
            font-family: 'Cinzel', serif; font-weight: 600; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-gold { background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light)); color: var(--dark); }
        .btn-green { background: linear-gradient(135deg, var(--green), var(--green-light)); color: #fff; }
        .btn-whatsapp { background: #25D366; color: #fff; text-decoration: none; margin-top: 15px; font-family: 'Lato'; }
        #feedback { margin-top: 16px; padding: 11px 14px; border-radius: 3px; font-size: 0.82rem; display: none; }
        #feedback.error { background: rgba(176,58,46,0.15); color: #E8A09A; border: 1px solid rgba(176,58,46,0.4); }
        #feedback.info { background: rgba(201,168,76,0.1); color: var(--gold-light); border: 1px solid rgba(201,168,76,0.3); }
        .hidden { display: none !important; }
        .loader { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="app">
    <div class="card">
        <div class="header">
            <div class="emblem" id="emblem">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4.5v15m7.5-7.5h-15"/>
                </svg>
            </div>
            <h1>Sistema de Convites</h1>
            <p class="subtitle" id="step-desc">Acesso Restrito</p>
        </div>

        <div id="auth-section">
            <div class="field-group">
                <label>E-mail Autorizado</label>
                <input type="email" id="auth-email" placeholder="seu@email.com">
            </div>
            <button class="btn btn-gold" onclick="verifyAccess()" id="btn-verify">Verificar Acesso</button>
        </div>

        <div id="form-section" class="hidden">
            <div class="field-group">
                <label>Nome do Convidado</label>
                <input type="text" id="guest-name" placeholder="Nome Completo">
            </div>
            <div class="field-group">
                <label>E-mail do Convidado</label>
                <input type="email" id="guest-email" placeholder="email@convidado.com">
            </div>
            <div class="field-group">
                <label>WhatsApp</label>
                <input type="tel" id="guest-phone" placeholder="(00) 00000-0000">
            </div>
            <button class="btn btn-green" onclick="submitGuest()" id="btn-submit">Cadastrar Convidado</button>
        </div>

        <div id="success-section" class="hidden" style="text-align:center;">
            <h2 style="color:var(--cream); margin-bottom:10px;">Sucesso!</h2>
            <p style="color:var(--cream-dim); font-size:0.9rem;">O convidado foi registado com sucesso.</p>
            <a href="https://sndflw.com/i/decifrandoossegredosdabiblia" target="_blank" class="btn btn-whatsapp">Entrar no Grupo</a>
            <button class="btn" style="background:none; color:var(--gold); margin-top:20px;" onclick="location.reload()">Novo Cadastro</button>
        </div>

        <div id="feedback"></div>
    </div>
</div>

<script>
const CONFIG = {
    sheetsId: '1jsBoGErysr_p8dr0SCJykbeklapjsYHNelDASOF9LDc',
    proxy: 'https://corsproxy.io/?',
    ac: {
        url: 'https://gruposoul.api-us1.com',
        token: '90d74a42f0495ead928e7a047e53a10e536e85c9ebc8e46be54dab8d5f1508c149eb23e3',
        tagSlug: 'db-convidado-tocha'
    }
};

let authorizedEmails = [];

function showFeedback(msg, type) {
    const f = document.getElementById('feedback');
    f.innerHTML = msg; f.className = type; f.style.display = 'block';
}

// Função robusta para processar CSV (lida com vírgulas dentro de aspas e separadores diferentes)
function parseCSV(text) {
    const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
    return lines.map(line => {
        // Tenta detetar se o separador é ; ou ,
        const sep = line.includes(';') ? ';' : ',';
        const pattern = new RegExp(`([^${sep}"]*|"[^"]*")(?=${sep}|$)`, 'g');
        const matches = line.match(pattern) || [];
        return matches.map(m => m.replace(/^"|"$/g, '').trim());
    });
}

async function verifyAccess() {
    const emailInput = document.getElementById('auth-email').value.trim().toLowerCase();
    const btn = document.getElementById('btn-verify');
    
    if (!emailInput.includes('@')) { showFeedback('Insira um e-mail válido.', 'error'); return; }

    btn.disabled = true; btn.innerHTML = '<div class="loader"></div> Verificando...';
    showFeedback('Consultando lista de permissões...', 'info');

    try {
        const csvUrl = `https://docs.google.com/spreadsheets/d/${CONFIG.sheetsId}/export?format=csv&gid=0`;
        const response = await fetch(CONFIG.proxy + encodeURIComponent(csvUrl));
        const csvData = await response.text();
        
        const rows = parseCSV(csvData);
        
        // Debug: Mostra no console o que foi lido da Coluna C (índice 2)
        console.log("Emails encontrados na Coluna C:", rows.map(r => r[2]));

        authorizedEmails = rows.map(row => row[2] ? row[2].toLowerCase() : "").filter(e => e.includes('@'));

        if (authorizedEmails.includes(emailInput)) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('form-section').classList.remove('hidden');
            document.getElementById('step-desc').innerText = 'Dados do Convidado';
            document.getElementById('feedback').style.display = 'none';
        } else {
            showFeedback('Este e-mail não tem autorização.', 'error');
            btn.disabled = false; btn.innerHTML = 'Verificar Acesso';
        }
    } catch (e) {
        showFeedback('Erro ao conectar à folha de cálculo. Verifique a partilha.', 'error');
        btn.disabled = false; btn.innerHTML = 'Verificar Acesso';
    }
}

async function submitGuest() {
    const name = document.getElementById('guest-name').value.trim();
    const email = document.getElementById('guest-email').value.trim();
    const phone = document.getElementById('guest-phone').value.trim();
    const btn = document.getElementById('btn-submit');

    if (!name || !email || !phone) { showFeedback('Preencha todos os campos.', 'error'); return; }

    btn.disabled = true; btn.innerHTML = '<div class="loader"></div> Processando...';

    try {
        // Enviar para ActiveCampaign
        const acUrl = CONFIG.proxy + encodeURIComponent(`${CONFIG.ac.url}/api/3/contacts`);
        const res = await fetch(acUrl, {
            method: 'POST',
            headers: { 'Api-Token': CONFIG.ac.token, 'Content-Type': 'application/json' },
            body: JSON.stringify({ contact: { email, firstName: name, phone } })
        });
        
        const data = await res.json();
        const contactId = data.contact ? data.contact.id : null;

        if (contactId) {
            // Aplicar Tag (Simplificado: assume que a tag existe ou cria erro silencioso)
            const tagUrl = CONFIG.proxy + encodeURIComponent(`${CONFIG.ac.url}/api/3/contactTags`);
            await fetch(tagUrl, {
                method: 'POST',
                headers: { 'Api-Token': CONFIG.ac.token, 'Content-Type': 'application/json' },
                body: JSON.stringify({ contactTag: { contact: contactId, tag: "26" } }) // ID da tag db001-26
            });
        }

        document.getElementById('form-section').classList.add('hidden');
        document.getElementById('success-section').classList.remove('hidden');
        document.getElementById('feedback').style.display = 'none';
        if (typeof fbq === 'function') fbq('trackCustom', CONFIG.pixelEvent);
        
    } catch (e) {
        showFeedback('Erro ao registar no ActiveCampaign.', 'error');
        btn.disabled = false; btn.innerHTML = 'Cadastrar Convidado';
    }
}
</script>
</body>
</html>
