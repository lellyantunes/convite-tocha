    <style>
        :root {
            --gold:       #C9A84C;
            --gold-light: #E8C97A;
            --gold-dark:  #9A7A32;
            --dark:       #0D0D0D;
            --dark-2:     #161616;
            --dark-3:     #1E1E1E;
            --cream:      #F5F0E8;
            --cream-dim:  #C8C0B0;
            --green:      #2E7D52;
            --green-light:#3DA06A;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Lato', sans-serif;
            background: var(--dark);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 24px 16px; position: relative; overflow-x: hidden;
        }

        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        #app { width: 100%; max-width: 440px; position: relative; z-index: 1; }

        .card {
            background: linear-gradient(160deg, var(--dark-2) 0%, var(--dark-3) 100%);
            border: 1px solid rgba(201,168,76,0.25); border-radius: 4px;
            padding: 48px 40px 40px; box-shadow: 0 32px 64px rgba(0,0,0,0.6);
            position: relative; overflow: hidden;
        }

        /* Ornamentos */
        .card::before, .card::after {
            content: ''; position: absolute; width: 40px; height: 40px;
            border-color: var(--gold-dark); border-style: solid; opacity: 0.4;
        }
        .card::before { top: 12px; left: 12px; border-width: 1px 0 0 1px; }
        .card::after  { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }

        .header { text-align: center; margin-bottom: 30px; }
        .emblem {
            width: 72px; height: 72px; border-radius: 50%;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; box-shadow: 0 4px 20px rgba(201,168,76,0.35);
            transition: all 0.5s ease;
        }
        .emblem svg { width: 32px; height: 32px; color: var(--dark); }

        h1 { font-family: 'Cinzel', serif; font-size: 1.5rem; color: var(--cream); letter-spacing: 0.04em; }
        .subtitle { font-size: 0.72rem; color: var(--cream-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 8px; }

        .field-group { margin-bottom: 14px; text-align: left; }
        label { display: block; font-size: 0.72rem; font-weight: 700; color: var(--gold); margin-bottom: 6px; text-transform: uppercase; }

        input {
            width: 100%; padding: 13px 16px; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(201,168,76,0.2); border-radius: 3px; color: var(--cream);
            outline: none; transition: all 0.25s; font-family: 'Lato';
        }
        input:focus { border-color: var(--gold); background: rgba(255,255,255,0.06); }

        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 3px;
            font-family: 'Cinzel', serif; font-size: 0.85rem; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 20px; transition: transform 0.15s; text-decoration: none;
        }
        .btn-gold { background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light)); color: var(--dark); }
        .btn-green { background: linear-gradient(135deg, var(--green), var(--green-light)); color: #fff; }
        .btn-whatsapp { background: linear-gradient(135deg, #128C7E, #25D366); color: #fff; font-family: 'Lato'; font-weight: 700; font-size: 0.95rem; }
        
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .invite-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.25);
            border-radius: 20px; padding: 5px 12px; font-size: 0.72rem; color: var(--gold-light);
            margin-bottom: 10px;
        }
        .invite-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .quota-bar-wrap { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; margin-bottom: 20px; }
        .quota-bar { height: 100%; background: var(--gold); transition: width 0.6s ease; }

        #feedback { margin-top: 15px; padding: 12px; border-radius: 3px; font-size: 0.8rem; display: none; }
        #feedback.error { background: rgba(176,58,46,0.15); color: #E8A09A; border: 1px solid rgba(176,58,46,0.3); }

        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .loader { width: 18px; height: 18px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

let currentUser = null;

function getCount(email) { return parseInt(localStorage.getItem('v_' + email) || '0', 10); }

function showFeedback(msg) {
    const f = document.getElementById('feedback');
    f.innerHTML = msg; f.className = 'error'; f.style.display = 'block';
}

function verifyAccess() {
    const email = document.getElementById('auth-email').value.trim().toLowerCase();
    const btn = document.getElementById('btn-verify');

    if (!email || !email.includes('@')) { showFeedback('Digite um e-mail válido.'); return; }

    btn.disabled = true; btn.innerHTML = '<div class="loader"></div>';

    // Simula uma pequena carga visual
    setTimeout(() => {
        if (!CONFIG.emails.includes(email)) {
            showFeedback('E-mail não autorizado para acesso.');
            btn.disabled = false; btn.innerHTML = 'Verificar Acesso';
            return;
        }
        if (getCount(email) >= CONFIG.maxInvites) {
            showFeedback('Você já utilizou seus ' + CONFIG.maxInvites + ' convites.');
            btn.disabled = false; btn.innerHTML = 'Verificar Acesso';
            return;
        }

        currentUser = email;
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('form-section').classList.remove('hidden');
        document.getElementById('feedback').style.display = 'none';
        updateQuotaUI();
    }, 600);
}

function updateQuotaUI() {
    const used = getCount(currentUser);
    const rem = CONFIG.maxInvites - used;
    const pct = (used / CONFIG.maxInvites) * 100;
    document.getElementById('quota-ui').innerHTML = `
        <div class="invite-badge"><span class="dot"></span> ${rem} convite(s) restante(s)</div>
        <div class="quota-bar-wrap"><div class="quota-bar" style="width:${pct}%"></div></div>
    `;
}

async function submitGuest() {
    const name = document.getElementById('guest-name').value.trim();
    const email = document.getElementById('guest-email').value.trim();
    const phone = document.getElementById('guest-phone').value.trim();
    const btn = document.getElementById('btn-submit');

    if (!name || !email || !phone) { showFeedback('Preencha todos os campos.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<div class="loader"></div><span>Enviando...</span>';

    try {
        // DISPARO WEBHOOK PARA N8N
        await fetch(CONFIG.webhook, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                aluno: currentUser,
                convidado: name,
                convidado_email: email,
                convidado_tel: phone,
                timestamp: new Date().toLocaleString('pt-BR')
            })
        });

        // Registrar uso e trocar tela
        localStorage.setItem('v_' + currentUser, (getCount(currentUser) + 1).toString());
        
        document.getElementById('form-section').classList.add('hidden');
        document.getElementById('success-section').classList.remove('hidden');
        document.getElementById('feedback').style.display = 'none';
        
        // Estilo de Sucesso no Cabeçalho
        document.getElementById('emblem-box').style.background = 'linear-gradient(135deg, var(--green), var(--green-light))';
        document.getElementById('emblem-box').style.boxShadow = '0 4px 20px rgba(46,125,82,0.4)';
        document.getElementById('emblem-svg').innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>';
        document.getElementById('step-desc').innerText = 'Cadastro Realizado';

        if (typeof fbq === 'function') fbq('track', 'Lead');

    } catch (e) {
        showFeedback('Erro ao processar. Tente novamente em instantes.');
        btn.disabled = false; btn.innerText = 'Enviar Convite';
    }
}
</script>
